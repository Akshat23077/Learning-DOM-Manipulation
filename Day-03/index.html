<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prevent Form Submission</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing: border-box;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
        html,body{
            width: 100%;
            height: 100%;
        }
        #main{
            /* display: flex; */
            
            padding: 50px;
         
            width:100%;
            height: 100%;
            background-color: #222;
            
        }
        .card{
            margin-top: 40px;
            padding:20px;
            border: 2px solid white;
            display: inline-block;
            color: white;
            max-width: 200px;
        }
        .profile{
            /* padding:20px; */
            border: 2px solid white;
            display: inline-block;
            width:40px;
            height: 40px;
            border-radius: 50%;
            /* background-color: red; */

        }
        .profile img{
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .card h5{
            margin-top: 5px;
        }
        .card p{
            font-size: 12px;
            margin-top: 10px;
        }
        

        
    </style>
</head>
<body>
    <div id="main">
        <form action="">
        <input type="text" placeholder="Name">
        <input type="text" placeholder="Age">
        <input type="text" placeholder="Email">
        <input type="text" placeholder="Profile Pic">
        <input type="Submit">
    </form>
    
    </div>
    
    
    <script src="script.js"></script>
</body>
</html>
